[databases]
ambulant = host=postgres port=5432 dbname=ambulant user=ambulant password=supersecretpg

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
log_connections = 1
log_disconnections = 1
