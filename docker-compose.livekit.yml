version: "3.8"

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command:
      - --dev
      - --bind=0.0.0.0
      - --port=7880
      - --api-key=devkey
      - --api-secret=devsecret
      - --rtc-port=7881
      - --ws-url=ws://127.0.0.1:7880
    ports:
      - "7880:7880"         # signaling (HTTP/WebSocket)
      - "7881:7881/udp"     # RTP/RTCP (UDP)
    restart: unless-stopped