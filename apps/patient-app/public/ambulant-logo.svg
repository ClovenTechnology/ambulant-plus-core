<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="1200"
  height="1000"
  viewBox="0 0 1200 1000"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Ambulant+ Contactless Medicine Logo"
>

  <!-- =========================
       DEFINITIONS
  ========================== -->
  <defs>
    <!-- Teal gradient -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2FD8D0"/>
      <stop offset="100%" stop-color="#1FB5AE"/>
    </linearGradient>
  </defs>

  <!-- =========================
       ICON (Contactless Clinician)
  ========================== -->
  <g transform="translate(400,120)">

    <!-- Contactless arc (single signal, subtle) -->
    <path
      d="M200 0
         C140 -40, 60 -40, 0 0"
      fill="none"
      stroke="url(#tealGradient)"
      stroke-width="14"
      stroke-linecap="round"
      opacity="0.9"
    />

    <!-- Head -->
    <path
      d="M100 20
         C60 20, 40 50, 40 90
         V120
         C40 160, 60 180, 100 180
         C140 180, 160 160, 160 120
         V90
         C160 50, 140 20, 100 20Z"
      fill="url(#tealGradient)"
    />

    <!-- Body -->
    <path
      d="M20 260
         C20 210, 60 190, 100 190
         C140 190, 180 210, 180 260
         V360
         H20Z"
      fill="url(#tealGradient)"
    />

    <!-- Stethoscope tube (flowing / data line) -->
    <path
      d="M120 230
         C160 250, 160 300, 140 320"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="10"
      stroke-linecap="round"
    />

    <!-- Data node (single point) -->
    <circle
      cx="140"
      cy="330"
      r="8"
      fill="#FFFFFF"
    />

    <!-- Stethoscope chest -->
    <circle
      cx="60"
      cy="300"
      r="16"
      fill="#FFFFFF"
    />

  </g>

  <!-- =========================
       WORDMARK
  ========================== -->
  <g transform="translate(200,620)">

    <!-- AMBULANT+ -->
    <text
      x="400"
      y="0"
      text-anchor="middle"
      font-family="Inter, Helvetica, Arial, sans-serif"
      font-size="120"
      font-weight="500"
      fill="#111111"
      letter-spacing="4"
    >
      AMBULANT<tspan
        font-weight="600"
        letter-spacing="2"
      >+</tspan>
    </text>

    <!-- CONTACTLESS MEDICINE -->
    <text
      x="400"
      y="90"
      text-anchor="middle"
      font-family="Inter, Helvetica, Arial, sans-serif"
      font-size="40"
      font-weight="400"
      fill="#1FB5AE"
      letter-spacing="10"
      opacity="0.8"
    >
      CONTACTLESS MEDICINE
    </text>

  </g>

</svg>
